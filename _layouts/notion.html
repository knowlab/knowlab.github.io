<!DOCTYPE html>
<html lang="{{ site.lang }}" prefix="og: http://ogp.me/ns#">
<head>
	<style>

		/* -----------------------------------------------------------
       PAGE LAYOUT
    ----------------------------------------------------------- */
		.page-content {
			max-width: 720px;
			margin-left: auto;
			margin-right: auto;
			padding: 2rem 1rem;
			box-sizing: border-box;
			width: 100%;
		}

		/* neutralize theme wrappers that fight the centering */
		.wrapper,
		.container {
			max-width: none !important;
			padding: 0 !important;
		}

		/* -----------------------------------------------------------
           TYPOGRAPHY
        ----------------------------------------------------------- */
		body {
			font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
			line-height: 1.65;
			font-size: 1.05rem;
			color: #2f3437;
			background: #ffffff;
		}

		/* -----------------------------------------------------------
           HEADINGS
        ----------------------------------------------------------- */
		h1, h2, h3, h4 {
			font-weight: 600;
			line-height: 1.3;
			margin-top: 2rem;
			margin-bottom: 0.7rem;
		}

		h1 { font-size: 2rem; }
		h2 { font-size: 1.55rem; }
		h3 { font-size: 1.25rem; }
		h4 { font-size: 1.1rem; }

		/* -----------------------------------------------------------
           GENERAL ELEMENTS
        ----------------------------------------------------------- */
		p {
			margin: 1rem 0;
		}

		img {
			max-width: 100%;
			border-radius: 4px;
		}

		hr {
			border: none;
			border-top: 1px solid #e6e6e6;
			margin: 2rem 0;
		}

		/* -----------------------------------------------------------
           LISTS
        ----------------------------------------------------------- */
		ul, ol {
			margin: 1rem 0 1rem 1.2rem;
			padding: 0;
		}

		li {
			margin: 0.4rem 0;
		}

		/* -----------------------------------------------------------
           CHECKBOXES
        ----------------------------------------------------------- */
		input[type="checkbox"] {
			width: 1rem;
			height: 1rem;
			margin-right: 0.4rem;
			accent-color: #2f3437;
		}

		/* -----------------------------------------------------------
           BLOCKQUOTES (Notion-style Callouts)
        ----------------------------------------------------------- */
		blockquote {
			background: #f7f6f3;
			border-left: 4px solid #e5e3dd;
			border-radius: 6px;
			padding: 1rem 1.2rem;
			margin: 1.5rem 0;
			color: #3f4042;
		}

		/* -----------------------------------------------------------
           CODE BLOCKS
        ----------------------------------------------------------- */
		pre, code {
			font-family: "JetBrains Mono", Consolas, monospace;
			background: #f6f8fa;
			border-radius: 6px;
		}

		pre {
			padding: 1rem;
			overflow-x: auto;
			margin: 1.5rem 0;
		}

		code {
			padding: 0.2rem 0.35rem;
			font-size: 0.95rem;
		}

		/* -----------------------------------------------------------
           TABLES (Notion-style)
        ----------------------------------------------------------- */
		table {
			width: 100%;
			border-collapse: collapse;
			margin: 1.5rem 0;
			font-size: 0.95rem;

			/* Keeps long tables from exploding layout */
			display: block;
			overflow-x: auto;
		}

		th, td {
			border: 1px solid #e5e5e5;
			padding: 0.6rem 0.8rem;
			vertical-align: top;
			text-align: left;
		}

		th {
			background: #f7f7f7;
			font-weight: 600;
		}

		tr:nth-child(even) td {
			background: #fafafa;
		}

		/* Smooth edges like Notion */
		table {
			border-radius: 6px;
			overflow: hidden;
		}

		/* -----------------------------------------------------------
           LINKS
        ----------------------------------------------------------- */
		a {
			color: #0b5fff;
			text-decoration: none;
		}

		a:hover {
			text-decoration: underline;
		}

		/* -----------------------------------------------------------
           CALLOUT ICON (optional mini touch)
        ----------------------------------------------------------- */
		.callout {
			display: flex;
			gap: 0.75rem;
			padding: 1rem;
			background: #f7f6f3;
			border-radius: 6px;
			margin: 1.5rem 0;
		}

		.callout-icon {
			font-size: 1.4rem;
		}

		/* Inline code (matches Notion’s reddish accent) */
		code {
			color: #eb5757; /* Notion's red-500-ish tone */
			background: rgba(235, 87, 87, 0.08);
			padding: 0.2rem 0.35rem;
			border-radius: 4px;
			font-family: "JetBrains Mono", Consolas, monospace;
			font-size: 0.95rem;
		}


	</style>
</head>
<body>
<div class="page-content">
	{{ content }}
</div>
</body>
</html>
